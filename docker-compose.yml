version: "3.9"
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: practica_nro05_06
      POSTGRES_USER: practica_nro05_06
      POSTGRES_PASSWORD: practica_nro05_06
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  backend:
    build:
      context: ./backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/practica_nro05_06
      SPRING_DATASOURCE_USERNAME: practica_nro05_06
      SPRING_DATASOURCE_PASSWORD: practica_nro05_06
    ports:
      - "8080:8080"
    depends_on:
      - postgres
  frontend:
    build:
      context: ./frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
volumes:
  pgdata:
